{% extends "base.html" %}
{% block content %}
<div class="fc-page">
    <div class="fc-header">
        <button class="fc-back" id="fc-back" onclick="exitFlashcards()" aria-label="Geri">
            <svg viewBox="0 0 24 24"><path d="M20,11H7.83l5.59,-5.59L12,4l-8,8 8,8 1.41,-1.41L7.83,13H20v-2z"/></svg>
        </button>
        <div class="fc-title">Kelime Kartları</div>
        <div class="fc-counter" id="fc-counter">KART 1</div>
    </div>

    <div class="fc-progress-track">
        <div class="fc-progress-fill" id="fc-progress-fill"></div>
    </div>

    <div class="fc-empty" id="fc-empty">Bugün çalışılacak kelime yok!</div>

    <div class="fc-card-area" id="fc-card-area">
        <div class="fc-card-container" id="fc-card-container" onclick="flipCard()">
            <div class="fc-card fc-card-front">
                <div class="fc-card-body">
                    <div class="fc-label">ALMANCA</div>
                    <div class="fc-word" id="fc-word-de">…</div>
                    <div class="fc-hint">Kartı çevirmek için dokun</div>
                </div>
                <button class="fc-pronounce" onclick="event.stopPropagation(); playPronunciation();">🔊 TELAFFUZ</button>
            </div>
            <div class="fc-card fc-card-back">
                <div class="fc-card-body">
                    <div class="fc-label">TÜRKÇE</div>
                    <div class="fc-word-tr" id="fc-word-tr"></div>
                    <div class="fc-example-box">
                        <div class="fc-label-sm">ÖRNEK</div>
                        <div class="fc-example-de" id="fc-example-de"></div>
                        <div class="fc-example-tr" id="fc-example-tr"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="fc-difficulty" id="fc-difficulty">
            <div class="fc-difficulty-labels">
                <span class="fc-diff-hard">ZOR</span>
                <span class="fc-diff-easy">KOLAY</span>
            </div>
            <div class="fc-difficulty-btns">
                <button class="fc-diff-btn fc-diff-1" onclick="submitQuality(1)">1</button>
                <button class="fc-diff-btn fc-diff-2" onclick="submitQuality(2)">2</button>
                <button class="fc-diff-btn fc-diff-3" onclick="submitQuality(3)">3</button>
                <button class="fc-diff-btn fc-diff-4" onclick="submitQuality(4)">4</button>
                <button class="fc-diff-btn fc-diff-5" onclick="submitQuality(5)">5</button>
            </div>
        </div>
    </div>
</div>

<div class="fc-summary-overlay" id="fc-summary-overlay">
    <div class="fc-summary-card">
        <svg class="complete-icon fc-summary-icon" viewBox="0 0 24 24"><path d="M12,2C6.47,2 2,6.47 2,12s4.47,10 10,10 10,-4.47 10,-10S17.53,2 12,2zM10,17l-5,-5 1.41,-1.41L10,14.17l7.59,-7.59L19,8z"/></svg>
        <div class="fc-summary-title">Oturum Tamamlandı</div>
        <div class="fc-summary-stats">
            <div class="fc-summary-stat">
                <div class="fc-summary-num" id="fc-summary-cards">0</div>
                <div class="fc-summary-lbl">Kart</div>
            </div>
        </div>
        <div class="xp-reward">
            <svg viewBox="0 0 24 24"><path d="M7,2v11h3v9l7,-12h-4l4,-8z"/></svg>
            +<span id="fc-summary-xp">0</span> XP
        </div>
        <button class="btn-primary" onclick="window.location.href='/web/'">Ana Sayfaya Dön</button>
    </div>
</div>
{% endblock %}
{% block scripts %}
<script>
if (requireAuth()) { loadFlashcards(); }
</script>
{% endblock %}
