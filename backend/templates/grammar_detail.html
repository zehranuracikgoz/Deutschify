{% extends "base.html" %}
{% block content %}
<div class="fc-page">
    <div class="fc-header">
        <button class="fc-back" onclick="exitGrammarDetail()" aria-label="Geri">
            <svg viewBox="0 0 24 24"><path d="M20,11H7.83l5.59,-5.59L12,4l-8,8 8,8 1.41,-1.41L7.83,13H20v-2z"/></svg>
        </button>
        <div class="fc-title" id="gr-title">Dil Bilgisi</div>
        <div class="fc-counter" id="gr-counter" style="display:none"></div>
    </div>

    <div class="fc-progress-track" id="gr-progress-track" style="display:none">
        <div class="fc-progress-fill" id="gr-progress-fill"></div>
    </div>
    <div id="gr-explain-view" class="gr-explain-view" style="display:none">
        <div class="gr-explain-card" id="gr-explain-content"></div>
        <button class="btn-primary" onclick="startGrammarExercises()">Alıştırmalara Başla</button>
    </div>

    <div id="gr-exercise-view" class="gr-exercise-view" style="display:none">
        <div class="gr-question-card">
            <div class="gr-question-text" id="gr-question-text">…</div>
            <div id="gr-fill-area" class="gr-fill-area" style="display:none">
                <input id="gr-fill-input" class="gr-fill-input" type="text"
                       placeholder="Cevabınızı yazın..."
                       onkeydown="if(event.key==='Enter') submitGrammarFill()">
            </div>
            <div id="gr-choice-area" class="gr-options" style="display:none"></div>
        </div>

        <div id="gr-feedback"  class="gr-feedback"></div>

        <div class="gr-btn-row">
            <button id="gr-submit-btn"  class="btn-primary" onclick="submitGrammarFill()" style="display:none">
                Kontrol Et
            </button>
            <button id="gr-next-btn" class="btn-primary" onclick="nextGrammarQuestion()" style="display:none">
                Sonraki Soru
            </button>
        </div>
    </div>
</div>

<div class="fc-summary-overlay" id="gr-summary-overlay">
    <div class="fc-summary-card">
        <svg class="complete-icon fc-summary-icon" viewBox="0 0 24 24"><path d="M12,2C6.47,2 2,6.47 2,12s4.47,10 10,10 10,-4.47 10,-10S17.53,2 12,2zM10,17l-5,-5 1.41,-1.41L10,14.17l7.59,-7.59L19,8z"/></svg>
        <div class="fc-summary-title">Konu Tamamlandı!</div>
        <div class="fc-summary-stats">
            <div class="fc-summary-stat">
                <div class="fc-summary-num correct" id="gr-summary-correct">0</div>
                <div class="fc-summary-lbl">Doğru</div>
            </div>
            <div class="fc-summary-stat">
                <div class="fc-summary-num wrong" id="gr-summary-wrong">0</div>
                <div class="fc-summary-lbl">Yanlış</div>
            </div>
        </div>
        <div class="xp-reward">
            <svg viewBox="0 0 24 24"><path d="M7,2v11h3v9l7,-12h-4l4,-8z"/></svg>
            +<span id="gr-summary-xp">0</span> XP
        </div>
        <button class="btn-primary" onclick="window.location.href='/web/grammar'">Konulara Dön</button>
    </div>
</div>

<nav class="bot-nav">
    <button class="nav-btn" onclick="window.location.href='/web/'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10,20v-6h4v6h5v-8h3L12,3 2,12h3v8z"/></svg>
        <span class="nav-tooltip">Ana Sayfa</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='/web/dashboard'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M5,9.2h3V19H5zM10.6,5h2.8v14h-2.8zM16.2,13h2.8v6h-2.8z"/></svg>
        <span class="nav-tooltip">İstatistikler</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='/web/history'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M13,3c-4.97,0 -9,4.03 -9,9L1,12l3.89,3.89 0.07,0.14L9,12L6,12c0,-3.87 3.13,-7 7,-7s7,3.13 7,7 -3.13,7 -7,7c-1.93,0 -3.68,-0.79 -4.94,-2.06l-1.42,1.42C8.27,19.99 10.51,21 13,21c4.97,0 9,-4.03 9,-9s-4.03,-9 -9,-9zM12,8v5l4.28,2.54 0.72,-1.21 -3.5,-2.08L13.5,8z"/></svg>
        <span class="nav-tooltip">Geçmiş</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='/web/profile'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z"/></svg>
        <span class="nav-tooltip">Profil</span>
    </button>
</nav>
{% endblock %}
{% block scripts %}
<script>
if (requireAuth())  { loadGrammarDetail(); }
</script>
{% endblock %}
