{% extends "base.html" %}
{% block content %}
<div class="scroll-area">
    <div class="desktop-greet" id="desktop-greet">
        <div class="greet-text">Tekrar hoş geldin, <strong id="greet-name">—</strong> 👋</div>
        <div class="greet-badges">
            <span class="greet-badge" id="greet-xp">0 XP</span>
            <span class="greet-badge" id="greet-streak">0 gün</span>
        </div>
    </div>
    <div class="page-title">Deutschify</div>
    <div class="page-sub">Akıllı öğrenme, hızlı ilerleme</div>

    <div class="dash-grid">
        <div class="dash-col-main">
            <div class="card">
                <div class="card-label">Günün Kelimesi</div>
                <div class="word-de" id="h-wde">…</div>
                <div class="word-tr" id="h-wtr">yükleniyor</div>
                <div class="example-box">
                    <div class="ex-de" id="h-exde">—</div>
                    <div class="ex-tr" id="h-extr"></div>
                </div>
            </div>

            <div class="module-grid">
                <button class="mod-btn mod-purple" onclick="window.location.href='/web/grammar'">
                    <svg class="mod-icon" viewBox="0 0 24 24"><path d="M18,2h-12c-1.1,0 -2,0.9 -2,2v16c0,1.1 0.9,2 2,2h12c1.1,0 2,-0.9 2,-2V4c0,-1.1 -0.9,-2 -2,-2zM6,4h5v8l-2.5,-1.5L6,12V4z"/></svg>
                    <div class="mod-name">Dil Bilgisi</div>
                    <div class="mod-desc">Kuralları Öğren</div>
                </button>
                <button class="mod-btn mod-teal" onclick="window.location.href='/web/artikel'">
                    <svg class="mod-icon" viewBox="0 0 24 24"><path d="M10.59,9.17L5.41,4 4,5.41l5.17,5.17 1.42,-1.41zM14.5,4l2.04,2.04L4,18.59 5.41,20 17.96,7.46 20,9.5V4h-5.5zM14.83,13.41l-1.41,1.41 3.13,3.13L14.5,20H20v-5.5l-2.04,2.04 -3.13,-3.13z"/></svg>
                    <div class="mod-name">Artikeller</div>
                    <div class="mod-desc">Der / Die / Das</div>
                </button>
                <button class="mod-btn mod-pink" onclick="window.location.href='/web/flashcards'">
                    <svg class="mod-icon" viewBox="0 0 24 24"><path d="M20,4L4,4c-1.11,0 -2,0.89 -2,2v12c0,1.11 0.89,2 2,2h16c1.11,0 2,-0.89 2,-2L22,6c0,-1.11 -0.89,-2 -2,-2zM20,18L4,18v-6h16v6zM20,8L4,8L4,6h16v2z"/></svg>
                    <div class="mod-name">Kelime Kartları</div>
                    <div class="mod-desc">Pratik Yap</div>
                </button>
                <button class="mod-btn mod-violet" onclick="window.location.href='/web/review'">
                    <svg class="mod-icon" viewBox="0 0 24 24"><path d="M7,2v11h3v9l7,-12h-4l4,-8z"/></svg>
                    <div class="mod-name">Tekrar</div>
                    <div class="mod-desc">Hataları İncele</div>
                </button>
            </div>
        </div>

        <div class="dash-col-side">
            <div class="card">
                <div class="chart-hdr">
                    <div class="chart-title">Haftalık Aktivite</div>
                    <div class="chart-time" id="h-chart-time">—</div>
                </div>
                <div class="bar-chart" id="bar-chart"></div>
            </div>

            <div class="home-extra-stats">
                <div class="stat-card">
                    <div class="stat-lbl">Doğru Cevap</div>
                    <div class="stat-val" id="h-correct">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-lbl">Başarı Oranı</div>
                    <div class="stat-val" id="h-rate">—</div>
                </div>
            </div>
        </div>
    </div>
</div>
<nav class="bot-nav">
    <button class="nav-btn on" onclick="window.location.href='/web/'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M10,20v-6h4v6h5v-8h3L12,3 2,12h3v8z"/></svg>
        <span class="nav-tooltip">Ana Sayfa</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='/web/dashboard'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M5,9.2h3V19H5zM10.6,5h2.8v14h-2.8zM16.2,13h2.8v6h-2.8z"/></svg>
        <span class="nav-tooltip">İstatistikler</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='/web/history'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M13,3c-4.97,0 -9,4.03 -9,9L1,12l3.89,3.89 0.07,0.14L9,12L6,12c0,-3.87 3.13,-7 7,-7s7,3.13 7,7 -3.13,7 -7,7c-1.93,0 -3.68,-0.79 -4.94,-2.06l-1.42,1.42C8.27,19.99 10.51,21 13,21c4.97,0 9,-4.03 9,-9s-4.03,-9 -9,-9zM12,8v5l4.28,2.54 0.72,-1.21 -3.5,-2.08L13.5,8z"/></svg>
        <span class="nav-tooltip">Geçmiş</span>
    </button>
    <button class="nav-btn" onclick="window.location.href='/web/profile'">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M12,12c2.21,0 4,-1.79 4,-4s-1.79,-4 -4,-4 -4,1.79 -4,4 1.79,4 4,4zM12,14c-2.67,0 -8,1.34 -8,4v2h16v-2c0,-2.66 -5.33,-4 -8,-4z"/></svg>
        <span class="nav-tooltip">Profil</span>
    </button>
</nav>
{% endblock %}
{% block scripts %}
<script>
if (requireAuth()) { loadHome(); }
</script>
{% endblock %}
