services:
  app:
    build: .
    ports:
      - "5000:10000"
    environment:
      - SECRET_KEY=dev-secret
      - JWT_SECRET_KEY=dev-jwt-secret
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/deutschify
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=deutschify
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: